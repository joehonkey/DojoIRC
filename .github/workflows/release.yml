name: Release

on:
  push:
    tags:
      - 'v*'

jobs:

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: |
          wails build -tags webkit2_41
          cp -r themes build/bin/
          tar -czf DojoIRC-linux-amd64.tar.gz -C build/bin DojoIRC themes

      - uses: actions/upload-artifact@v4
        with:
          name: DojoIRC-linux-amd64
          path: DojoIRC-linux-amd64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        shell: pwsh
        run: |
          wails build
          Copy-Item -Recurse themes build\bin\
          Compress-Archive -Path build\bin\DojoIRC.exe, build\bin\themes -DestinationPath DojoIRC-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: DojoIRC-windows-amd64
          path: DojoIRC-windows-amd64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: |
          wails build
          cp -r themes build/bin/
          if [ -d "build/bin/DojoIRC.app" ]; then
            tar -czf DojoIRC-macos-arm64.tar.gz -C build/bin DojoIRC.app themes
          else
            tar -czf DojoIRC-macos-arm64.tar.gz -C build/bin DojoIRC themes
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: DojoIRC-macos-arm64
          path: DojoIRC-macos-arm64.tar.gz

  package-themes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package themes
        run: zip -r themes.zip themes/

      - uses: actions/upload-artifact@v4
        with:
          name: themes
          path: themes.zip

  release:
    needs: [build-linux, build-windows, build-macos, package-themes]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            DojoIRC-linux-amd64.tar.gz
            DojoIRC-windows-amd64.zip
            DojoIRC-macos-arm64.tar.gz
            themes.zip
